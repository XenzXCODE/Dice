    <script>
        const i18n = {
            en: {
                app_name: "3D Dice Roller",
                subtitle: "Professional 3D Dice Platform",
                settings_title: "Dice Settings",
                dice_type: "Dice Type (Faces)",
                dice_count: "Number of Dice",
                d4: "D4 (4 Faces - Pyramid)",
                d6: "D6 (6 Faces - Cube)",
                d8: "D8 (8 Faces - Octahedron)",
                d12: "D12 (12 Faces - Dodecahedron)",
                d20: "D20 (20 Faces - Icosahedron)",
                btn_roll: "ROLL DICE",
                total_label: "Total:"
            },
            tr: {
                app_name: "ZarUstası 3D",
                subtitle: "Profesyonel 3D Zar Atma Platformu",
                settings_title: "Zar Ayarları",
                dice_type: "Zar Tipi (Yüz Sayısı)",
                dice_count: "Zar Sayısı",
                d4: "D4 (4 Yüzlü - Piramit)",
                d6: "D6 (6 Yüzlü - Küp)",
                d8: "D8 (8 Yüzlü - Oktahedron)",
                d12: "D12 (12 Yüzlü - Dodekahedron)",
                d20: "D20 (20 Yüzlü - İkosahedron)",
                btn_roll: "ZAR AT",
                total_label: "Toplam:"
            }
        };

        let currentLang = localStorage.getItem('dice_lang') || 'en';

        function applyLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('dice_lang', lang);
            document.documentElement.lang = lang; 
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });

            document.getElementById('opt-d4').textContent = i18n[lang].d4;
            document.getElementById('opt-d6').textContent = i18n[lang].d6;
            document.getElementById('opt-d8').textContent = i18n[lang].d8;
            document.getElementById('opt-d12').textContent = i18n[lang].d12;
            document.getElementById('opt-d20').textContent = i18n[lang].d20;

            const btnEn = document.getElementById('btn-lang-en');
            const btnTr = document.getElementById('btn-lang-tr');
            
            if (lang === 'en') {
                btnEn.classList.add('bg-indigo-500', 'text-white', 'shadow');
                btnEn.classList.remove('text-slate-400');
                btnTr.classList.remove('bg-indigo-500', 'text-white', 'shadow');
                btnTr.classList.add('text-slate-400');
            } else {
                btnTr.classList.add('bg-indigo-500', 'text-white', 'shadow');
                btnTr.classList.remove('text-slate-400');
                btnEn.classList.remove('bg-indigo-500', 'text-white', 'shadow');
                btnEn.classList.add('text-slate-400');
            }
        }

        document.getElementById('btn-lang-en').addEventListener('click', () => applyLanguage('en'));
        document.getElementById('btn-lang-tr').addEventListener('click', () => applyLanguage('tr'));

        const state = {
            diceType: 6,
            diceCount: 1,
            isRolling: false,
            rollCounter: 0
        };

        const canvasContainer = document.getElementById('canvas-container');
        const btnRoll = document.getElementById('btn-roll');
        const selectDiceType = document.getElementById('dice-type');
        const btnsDiceCount = document.querySelectorAll('.btn-dice-count');
        const totalResultDiv = document.getElementById('total-result');
        const totalScoreSpan = document.getElementById('total-score');
        
        const btnOpenSettings = document.getElementById('btn-open-settings');
        const btnCloseSettings = document.getElementById('btn-close-settings');
        const settingsDrawer = document.getElementById('settings-drawer');
        const settingsOverlay = document.getElementById('settings-overlay');

        function toggleSettings() {
            const isClosed = settingsDrawer.classList.contains('translate-x-full');
            if (isClosed) {
                settingsOverlay.classList.remove('hidden');
                setTimeout(() => settingsOverlay.classList.remove('opacity-0'), 10); 
                settingsDrawer.classList.remove('translate-x-full');
            } else {
                settingsOverlay.classList.add('opacity-0');
                settingsDrawer.classList.add('translate-x-full');
                setTimeout(() => settingsOverlay.classList.add('hidden'), 300); 
            }
        }

        btnOpenSettings.addEventListener('click', toggleSettings);
        btnCloseSettings.addEventListener('click', toggleSettings);
        settingsOverlay.addEventListener('click', toggleSettings);

        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, canvasContainer.clientWidth / canvasContainer.clientHeight, 0.1, 100);
        camera.position.set(0, 9, 7); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        canvasContainer.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 2);
        spotLight.position.set(5, 15, 5);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);

        const pointLight = new THREE.PointLight(0x6366f1, 2, 20);
        pointLight.position.set(-5, 5, -5);
        scene.add(pointLight);

        const planeGeometry = new THREE.PlaneGeometry(50, 50);
        const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.3 });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -1;
        plane.receiveShadow = true;
        scene.add(plane);

        const diceMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x1e293b,       
            emissive: 0x0f172a,    
            roughness: 0.2,        
            metalness: 0.5,
            clearcoat: 1.0,        
            clearcoatRoughness: 0.1,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        });

        const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x818cf8, linewidth: 2 }); 

        let activeDiceMeshes = [];
        let activeHolograms = [];

        function createDiceGeometry(faces) {
            const radius = 1.5;
            let geometry;
            switch(parseInt(faces)) {
                case 4: geometry = new THREE.TetrahedronGeometry(radius); break;
                case 6: geometry = new THREE.BoxGeometry(2, 2, 2); break;
                case 8: geometry = new THREE.OctahedronGeometry(radius); break;
                case 12: geometry = new THREE.DodecahedronGeometry(radius); break;
                case 20: geometry = new THREE.IcosahedronGeometry(radius); break;
                default: geometry = new THREE.BoxGeometry(2, 2, 2);
            }
            
            geometry = geometry.toNonIndexed();
            geometry.computeVertexNormals();
            geometry.clearGroups();

            const f = parseInt(faces);
            if (f === 6) {
                for(let i=0; i<6; i++) geometry.addGroup(i * 6, 6, i);
            } else if (f === 12) {
                for(let i=0; i<12; i++) geometry.addGroup(i * 9, 9, i);
            } else {
                for(let i=0; i<f; i++) geometry.addGroup(i * 3, 3, i);
            }
            return geometry;
        }

        function getFaceNormal(geometry, index) {
            const group = geometry.groups.find(g => g.materialIndex === index);
            if(!group) return new THREE.Vector3(0,1,0); 
            
            const pos = geometry.attributes.position;
            const vA = new THREE.Vector3().fromBufferAttribute(pos, group.start);
            const vB = new THREE.Vector3().fromBufferAttribute(pos, group.start + 1);
            const vC = new THREE.Vector3().fromBufferAttribute(pos, group.start + 2);
            
            const cb = new THREE.Vector3().subVectors(vC, vB);
            const ab = new THREE.Vector3().subVectors(vA, vB);
            return cb.cross(ab).normalize();
        }

        function drawDiceDots(ctx, num) {
            ctx.fillStyle = (num === 1) ? '#ef4444' : '#ffffff';
            const r = 14;
            const pos = {
                1: [[64, 64]],
                2: [[32, 32], [96, 96]],
                3: [[32, 32], [64, 64], [96, 96]],
                4: [[32, 32], [96, 32], [32, 96], [96, 96]],
                5: [[32, 32], [96, 32], [64, 64], [32, 96], [96, 96]],
                6: [[32, 24], [32, 64], [32, 104], [96, 24], [96, 64], [96, 104]]
            };
            if(pos[num]) {
                pos[num].forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p[0], p[1], r, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        function attachNumbersToFaces(diceMesh, facesType) {
            const geometry = diceMesh.geometry;
            const pos = geometry.attributes.position;
            
            for (let i = 0; i < facesType; i++) {
                const group = geometry.groups.find(g => g.materialIndex === i);
                if (!group) continue;
                
                const center = new THREE.Vector3();
                for(let j=0; j<group.count; j++) {
                    center.add(new THREE.Vector3().fromBufferAttribute(pos, group.start + j));
                }
                center.divideScalar(group.count);
                const normal = getFaceNormal(geometry, i);
                
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                
                if (facesType === 6) {
                    drawDiceDots(ctx, i + 1);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 72px Inter';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText((i + 1).toString(), 64, 64);
                }
                
                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ 
                    map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide
                });
                
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.4), mat);
                plane.position.copy(center).add(normal.clone().multiplyScalar(0.01)); 
                plane.lookAt(center.clone().add(normal));
                plane.userData.resultNumber = i + 1;
                diceMesh.add(plane);
            }
        }

        function spawnDice() {
            activeDiceMeshes.forEach(mesh => scene.remove(mesh));
            activeHolograms.forEach(holo => scene.remove(holo));
            activeDiceMeshes = [];
            activeHolograms = [];
            totalResultDiv.classList.remove('opacity-100');
            totalResultDiv.classList.add('opacity-0');

            const faces = state.diceType;
            const count = state.diceCount;
            const geometry = createDiceGeometry(faces);
            const spacing = 3;
            const startX = -((count - 1) * spacing) / 2;

            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(geometry, diceMaterial.clone());
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, edgeMaterial.clone());
                mesh.add(line); 

                attachNumbersToFaces(mesh, faces);

                mesh.position.set(startX + (i * spacing), 0, 0);
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);

                scene.add(mesh);
                activeDiceMeshes.push(mesh);
            }
        }

        selectDiceType.addEventListener('change', (e) => {
            state.diceType = parseInt(e.target.value);
            if (!state.isRolling) spawnDice();
        });

        btnsDiceCount.forEach(btn => {
            btn.addEventListener('click', (e) => {
                btnsDiceCount.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.diceCount = parseInt(e.target.dataset.count);
                if (!state.isRolling) spawnDice();
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
        });

        btnRoll.addEventListener('click', () => {
            if (state.isRolling) return;
            state.rollCounter++;
            rollDice();
        });

        function rollDice() {
            state.isRolling = true;
            btnRoll.classList.add('opacity-50', 'cursor-not-allowed');
            totalResultDiv.classList.remove('opacity-100');
            totalResultDiv.classList.add('opacity-0');
            
            activeHolograms.forEach(holo => scene.remove(holo));
            activeHolograms = [];
            
            let completedCount = 0;
            let totalScore = 0;

            activeDiceMeshes.forEach((mesh) => {
                const resultNumber = Math.floor(Math.random() * state.diceType) + 1;
                totalScore += resultNumber;

                mesh.children.forEach(c => {
                    if(c.isMesh && c.geometry.type === 'PlaneGeometry') {
                        c.material.color.setHex(0xffffff);
                    }
                });

                const startQuat = mesh.quaternion.clone();
                const targetNormal = getFaceNormal(mesh.geometry, resultNumber - 1);
                
                const alignQuat = new THREE.Quaternion().setFromUnitVectors(targetNormal, new THREE.Vector3(0, 1, 0));
                const randomY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), Math.random() * Math.PI * 2);
                alignQuat.premultiply(randomY);

                gsap.to(mesh.position, {
                    y: 4 + Math.random() * 2,
                    duration: 0.6,
                    ease: "power2.out",
                    yoyo: true, 
                    repeat: 1,  
                });

                const dummy = { t: 0 };
                const chaosAxis = new THREE.Vector3(Math.random(), Math.random(), Math.random()).normalize();
                
                gsap.to(dummy, {
                    t: 1,
                    duration: 1.2,
                    ease: "power2.inOut",
                    onUpdate: () => {
                        const current = startQuat.clone().slerp(alignQuat, dummy.t);
                        const wildSpin = new THREE.Quaternion().setFromAxisAngle(chaosAxis, (1 - dummy.t) * Math.PI * 8);
                        mesh.quaternion.copy(current).multiply(wildSpin);
                    },
                    onComplete: () => {
                        mesh.quaternion.copy(alignQuat); 
                        mesh.position.y = 0;
                        
                        const winPlane = mesh.children.find(c => c.userData.resultNumber === resultNumber);
                        if (winPlane) {
                            winPlane.material.color.setHex(0xa855f7); 
                            gsap.fromTo(winPlane.scale, 
                                {x: 1.8, y: 1.8}, 
                                {x: 1, y: 1, duration: 0.5, ease: "back.out(2)"}
                            );
                        }
                        
                        showHologram(mesh, resultNumber);
                        
                        completedCount++;
                        if (completedCount === state.diceCount) {
                            finalizeRoll(totalScore);
                        }
                    }
                });
            });
        }

        function showHologram(mesh, number) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; 
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.shadowColor = '#a855f7';
            ctx.shadowBlur = 30;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.75)'; 
            ctx.beginPath();
            ctx.arc(128, 128, 90, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(129, 140, 248, 0.9)'; 
            ctx.stroke();

            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 15; 
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 96px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number.toString(), 128, 136); 

            const tex = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0 });
            const sprite = new THREE.Sprite(spriteMat);
            
            sprite.position.copy(mesh.position);
            sprite.position.y += 1.5;
            sprite.scale.set(2.5, 2.5, 1);
            
            scene.add(sprite);
            activeHolograms.push(sprite);

            gsap.to(sprite.position, { y: sprite.position.y + 1.2, duration: 0.8, ease: "back.out(1.2)" });
            gsap.to(spriteMat, { opacity: 1, duration: 0.5 });
        }

        function finalizeRoll(total) {
            state.isRolling = false;
            btnRoll.classList.remove('opacity-50', 'cursor-not-allowed');
            totalScoreSpan.textContent = total;
            totalResultDiv.classList.remove('opacity-0');
            totalResultDiv.classList.add('opacity-100');
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!state.isRolling && activeDiceMeshes.length > 0) {
                const time = Date.now() * 0.001;
                activeDiceMeshes.forEach((mesh, i) => {
                    mesh.position.y = Math.sin(time * 2 + i) * 0.1;
                });
            }
            renderer.render(scene, camera);
        }

        window.onload = function() {
            applyLanguage(currentLang); 
            spawnDice();
            animate();
        };
    </script>
</body>
</html>
