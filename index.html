    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "3D Dice Roller",

    <script>
        // --- Dil Sistemi (i18n) ---
        const translations = {
            en: {
                title: "3D Dice Roller",
                rollBtn: "Roll Dice!",
                settingsTitle: "Settings",
                diceCount: "Number of Dice",
                diceType: "Dice Type"
            },
            tr: {
                title: "Zar Ustası 3D",
                rollBtn: "Zarları At!",
                settingsTitle: "Ayarlar",
                diceCount: "Zar Adedi",
                diceType: "Zar Tipi"
            }
        };

        let currentLang = localStorage.getItem('diceLang') || 'en';
        
        function applyLanguage(lang) {
            document.getElementById('titleText').textContent = translations[lang].title;
            document.getElementById('rollBtnText').textContent = translations[lang].rollBtn;
            document.getElementById('settingsTitleText').innerHTML = `<svg class="w-5 h-5 text-blue-500 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>` + translations[lang].settingsTitle;
            document.getElementById('diceCountText').textContent = translations[lang].diceCount;
            document.getElementById('diceTypeText').textContent = translations[lang].diceType;
            document.getElementById('langBtn').textContent = lang === 'en' ? 'EN | TR' : 'TR | EN';
            document.documentElement.lang = lang;
        }

        applyLanguage(currentLang);

        document.getElementById('langBtn').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            localStorage.setItem('diceLang', currentLang);
            applyLanguage(currentLang);
        });

        // --- Ayarlar Menüsü Kontrolü ---
        const drawer = document.getElementById('settings-drawer');
        document.getElementById('openSettingsBtn').addEventListener('click', () => drawer.classList.add('drawer-open'));
        document.getElementById('closeSettingsBtn').addEventListener('click', () => drawer.classList.remove('drawer-open'));

        // --- 3D Sahne ve Fizik Motoru Ayarları ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = null; 

        // Kamerayı kuşbakışına yakın konumlandırdık (Yüksek Y, Düşük Z)
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 12, 6); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -30, 0); 
        world.broadphase = new CANNON.NaiveBroadphase();
        world.solver.iterations = 10;

        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x3b82f6, 1, 20);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);

        // Zemin Geometrisi (Görünmez Fizik Zemini)
        const groundBody = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Plane(),
            material: new CANNON.Material({ friction: 0.3, restitution: 0.5 })
        });
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);

        // Görsel Zemin (Gölgeler İçin)
        const groundMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.ShadowMaterial({ opacity: 0.5 })
        );
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        let diceMeshes = [];
        let diceBodies = [];
        let currentDiceType = 'd6';
        let isRolling = false;
        let activeHolograms = [];
        const hologramContainer = document.getElementById('hologram-container');

        // Zar Geometrileri
        const geometries = {
            d4: new THREE.TetrahedronGeometry(1.2),
            d6: new THREE.BoxGeometry(1.5, 1.5, 1.5),
            d12: new THREE.DodecahedronGeometry(1.2),
            d20: new THREE.IcosahedronGeometry(1.2)
        };

        const diceMaterial = new THREE.MeshStandardMaterial({
            color: 0x1e293b,
            roughness: 0.2,
            metalness: 0.8,
            envMapIntensity: 1
        });

        // Zar Oluşturma Fonsiyonu
        function createDice() {
            clearDice();
            const count = parseInt(document.getElementById('diceCount').value);
            
            for (let i = 0; i < count; i++) {
                const geometry = geometries[currentDiceType];
                const mesh = new THREE.Mesh(geometry, diceMaterial);
                mesh.castShadow = true;
                
                // Noktalar/Sayılar için kenar çizgileri (Basit estetik)
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x3b82f6, linewidth: 2 }));
                mesh.add(line);

                scene.add(mesh);
                diceMeshes.push(mesh);

                let shape;
                if(currentDiceType === 'd6') {
                    shape = new CANNON.Box(new CANNON.Vec3(0.75, 0.75, 0.75));
                } else {
                    shape = new CANNON.Sphere(1.2); 
                }

                const body = new CANNON.Body({
                    mass: 1,
                    shape: shape,
                    material: new CANNON.Material({ friction: 0.3, restitution: 0.5 })
                });

                world.addBody(body);
                diceBodies.push(body);
            }
            positionDiceInitial();
        }

        function clearDice() {
            diceMeshes.forEach(mesh => scene.remove(mesh));
            diceBodies.forEach(body => world.removeBody(body));
            diceMeshes = [];
            diceBodies = [];
            clearHolograms();
        }

        function clearHolograms() {
            activeHolograms.forEach(h => h.remove());
            activeHolograms = [];
        }

        function positionDiceInitial() {
            const spacing = 2;
            const startX = -((diceMeshes.length - 1) * spacing) / 2;
            
            diceBodies.forEach((body, index) => {
                body.position.set(startX + (index * spacing), 1, 0);
                body.velocity.set(0,0,0);
                body.angularVelocity.set(0,0,0);
                body.quaternion.setFromEuler(0,0,0);
                
                diceMeshes[index].position.copy(body.position);
                diceMeshes[index].quaternion.copy(body.quaternion);
            });
        }

        // --- Hologram Baloncuk Efekti ---
        function showHologram(x, z, value) {
            const holo = document.createElement('div');
            holo.className = 'hologram-bubble';
            holo.textContent = value;
            hologramContainer.appendChild(holo);
            
            // 3D Pozisyonu 2D Ekrana Çevirme
            const pos = new THREE.Vector3(x, 1.5, z);
            pos.project(camera);
            
            const rect = container.getBoundingClientRect();
            const left = (pos.x * .5 + .5) * rect.width;
            const top = (-(pos.y * .5) + .5) * rect.height;
            
            holo.style.left = left + 'px';
            holo.style.top = top + 'px';
            
            gsap.to(holo, {
                opacity: 1,
                top: top - 50,
                duration: 0.6,
                ease: "back.out(1.5)"
            });

            activeHolograms.push(holo);
        }

        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            clearHolograms();

            document.getElementById('rollBtnText').textContent = currentLang === 'en' ? "Rolling..." : "Atılıyor...";
            document.getElementById('rollBtn').classList.add('opacity-70', 'cursor-not-allowed');

            diceBodies.forEach((body) => {
                body.position.y = 8 + Math.random() * 4;
                body.position.x = (Math.random() - 0.5) * 4;
                body.position.z = (Math.random() - 0.5) * 4;
                
                body.velocity.set(
                    (Math.random() - 0.5) * 10,
                    -10,
                    (Math.random() - 0.5) * 10
                );
                
                body.angularVelocity.set(
                    Math.random() * 20 * Math.PI,
                    Math.random() * 20 * Math.PI,
                    Math.random() * 20 * Math.PI
                );
            });

            setTimeout(() => {
                checkDiceSettled();
            }, 1000);
        }

        function checkDiceSettled() {
            let settled = true;
            diceBodies.forEach(body => {
                if (body.velocity.lengthSquared() > 0.1 || body.angularVelocity.lengthSquared() > 0.1) {
                    settled = false;
                }
            });

            if (settled) {
                isRolling = false;
                document.getElementById('rollBtnText').textContent = currentLang === 'en' ? "Roll Dice!" : "Zarları At!";
                document.getElementById('rollBtn').classList.remove('opacity-70', 'cursor-not-allowed');
                
                // Hologramları Göster
                diceBodies.forEach((body, index) => {
                    const max = parseInt(currentDiceType.replace('d', ''));
                    const result = Math.floor(Math.random() * max) + 1; // Basit Rastgele Sonuç
                    showHologram(body.position.x, body.position.z, result);
                });
            } else {
                requestAnimationFrame(checkDiceSettled);
            }
        }

        // UI Etkileşimleri
        document.getElementById('rollBtn').addEventListener('click', rollDice);

        document.getElementById('diceCount').addEventListener('input', (e) => {
            document.getElementById('diceCountDisplay').textContent = e.target.value;
            if(!isRolling) createDice();
        });

        document.querySelectorAll('.dice-type-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.dice-type-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'border-blue-400', 'shadow-[0_0_10px_rgba(59,130,246,0.3)]');
                    b.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
                });
                
                e.target.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
                e.target.classList.add('bg-blue-600', 'text-white', 'border-blue-400', 'shadow-[0_0_10px_rgba(59,130,246,0.3)]');
                
                currentDiceType = e.target.dataset.type;
                if(!isRolling) createDice();
            });
        });

        // Animasyon Döngüsü
        const fixedTimeStep = 1.0 / 60.0;
        function animate() {
            requestAnimationFrame(animate);
            
            world.step(fixedTimeStep);
            
            for (let i = 0; i < diceMeshes.length; i++) {
                diceMeshes[i].position.copy(diceBodies[i].position);
                diceMeshes[i].quaternion.copy(diceBodies[i].quaternion);
            }
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            if(!isRolling) clearHolograms(); // Resize anında hizalar bozulmasın diye
        });

        // Başlangıç Kurulumu
        createDice();
        animate();
    </script>
