<body class="flex flex-col h-screen text-slate-100">

                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>

        <!-- 728x90 Adsterra Üst Reklam Alanı -->
        <div class="hidden md:flex justify-center items-center w-full bg-slate-900 border-t border-slate-800 p-2 min-h-[90px]">
            <script>

        </div>

    <main class="flex-1 flex overflow-hidden relative w-full">
        <div id="canvas-wrapper" class="flex-1 relative w-full h-full">
            <div id="canvas-container" class="w-full h-full"></div>
            <div id="hologram-container" class="absolute inset-0 pointer-events-none z-10 overflow-hidden"></div>

            <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 ui-layer pointer-events-auto">
                <button id="rollBtn" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-12 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.5)] transform hover:scale-105 transition-all text-xl uppercase tracking-wider">
                    <span id="rollBtnText">Roll Dice!</span>
                </button>
            </div>
        </div>

        <aside id="settings-drawer" class="fixed inset-y-0 right-0 w-full sm:w-[350px] bg-dark/95 backdrop-blur-xl border-l border-slate-700 shadow-2xl transform translate-x-full z-30 ui-layer pointer-events-auto flex flex-col">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900">
                <h2 class="text-xl font-bold flex items-center gap-2 text-white" id="settingsTitleText">Settings</h2>
                <button id="closeSettingsBtn" class="text-slate-400 hover:text-white transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="p-5 overflow-y-auto flex-1">
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2 text-slate-300" id="diceCountText">Number of Dice</label>
                    <div class="flex items-center gap-4 bg-slate-800/50 p-2 rounded-xl border border-slate-700">
                        <input type="range" id="diceCount" min="1" max="10" value="2" class="w-full accent-blue-500">
                        <span id="diceCountDisplay" class="font-mono text-lg font-bold w-6 text-center text-blue-400">2</span>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2 text-slate-300" id="diceTypeText">Dice Type</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="dice-type-btn bg-blue-600 text-white py-2 rounded-lg border border-blue-400 transition shadow-[0_0_10px_rgba(59,130,246,0.3)]" data-type="d6">D6 (Cube)</button>
                        <button class="dice-type-btn bg-slate-800 text-slate-300 py-2 rounded-lg border border-slate-700 transition" data-type="d12">D12</button>
                        <button class="dice-type-btn bg-slate-800 text-slate-300 py-2 rounded-lg border border-slate-700 transition" data-type="d20">D20</button>
                    </div>
                </div>

                <!-- 300x250 Adsterra Sağ Menü Reklam Alanı -->
                <div class="mt-6 bg-slate-900 p-2 rounded-xl flex justify-center items-center min-h-[250px] border border-slate-700">
                    <script>
                        atOptions = { 'key' : '8008f8d4a16d970a0480c51aa705528c', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
                    </script>
                    <script src="https://www.highperformanceformat.com/8008f8d4a16d970a0480c51aa705528c/invoke.js"></script>
                </div>

                <!-- Native Banner Adsterra Reklam Alanı -->
                <div class="mt-4 bg-slate-900 p-2 rounded-xl flex justify-center items-center border border-slate-700">
                    <script async="async" data-cfasync="false" src="https://pl30250908.effectivecpmnetwork.com/03e3fc8f8878de82b97f7481b201dc7b/invoke.js"></script>
                    <div id="container-03e3fc8f8878de82b97f7481b201dc7b"></div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // Dil Sistemi
        const trans = {
            en: { title: "3D Dice Roller", roll: "Roll Dice!", set: "Settings", count: "Number of Dice", type: "Dice Type" },
            tr: { title: "Zar Ustası", roll: "Zarları At!", set: "Ayarlar", count: "Zar Adedi", type: "Zar Tipi" }
        };
        let lang = localStorage.getItem('diceLang') || 'en';
        function applyLang() {
            document.getElementById('titleText').textContent = trans[lang].title;
            document.getElementById('rollBtnText').textContent = trans[lang].roll;
            document.getElementById('settingsTitleText').textContent = trans[lang].set;
            document.getElementById('diceCountText').textContent = trans[lang].count;
            document.getElementById('diceTypeText').textContent = trans[lang].type;
            document.getElementById('langBtn').textContent = lang === 'en' ? 'EN | TR' : 'TR | EN';
        }
        applyLang();
        document.getElementById('langBtn').onclick = () => { lang = lang === 'en' ? 'tr' : 'en'; localStorage.setItem('diceLang', lang); applyLang(); };

        // UI
        const drawer = document.getElementById('settings-drawer');
        document.getElementById('openSettingsBtn').onclick = () => drawer.classList.add('drawer-open');
        document.getElementById('closeSettingsBtn').onclick = () => drawer.classList.remove('drawer-open');

        // Gelişmiş 3D Zar Motoru
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 14, 8); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -40, 0);
        world.broadphase = new CANNON.NaiveBroadphase();

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: new CANNON.Material({ friction: 0.1, restitution: 0.5 }) });
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);

        const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.ShadowMaterial({ opacity: 0.3 }));
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        let diceData = [];
        let currentType = 'd6';
        let isRolling = false;
        const holoContainer = document.getElementById('hologram-container');

        // Yüzey Dokularını (Sayılar/Noktalar) Çizen Gelişmiş Fonksiyon
        function createDiceTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 10;
            ctx.strokeRect(10, 10, 236, 236);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 100px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function buildDice() {
            diceData.forEach(d => { scene.remove(d.mesh); world.removeBody(d.body); });
            diceData = [];
            holoContainer.innerHTML = '';
            
            const count = parseInt(document.getElementById('diceCount').value);
            
            for (let i = 0; i < count; i++) {
                let geometry, shape, materials = [];
                
                if (currentType === 'd6') {
                    geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                    shape = new CANNON.Box(new CANNON.Vec3(0.75, 0.75, 0.75));
                    // 6 Yüzey için dokular
                    for(let j=1; j<=6; j++) materials.push(new THREE.MeshStandardMaterial({ map: createDiceTexture(j.toString()), roughness: 0.3 }));
                } else if (currentType === 'd12') {
                    geometry = new THREE.DodecahedronGeometry(1.2);
                    shape = new CANNON.Sphere(1.2);
                    materials = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.2 });
                } else {
                    geometry = new THREE.IcosahedronGeometry(1.2);
                    shape = new CANNON.Sphere(1.2);
                    materials = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.2 });
                }

                const mesh = new THREE.Mesh(geometry, materials);
                mesh.castShadow = true;
                
                if(currentType !== 'd6') {
                    const edges = new THREE.EdgesGeometry(geometry);
                    mesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x3b82f6, linewidth: 2 })));
                }

                scene.add(mesh);
                const body = new CANNON.Body({ mass: 1, shape: shape, material: new CANNON.Material({ friction: 0.3, restitution: 0.4 }) });
                world.addBody(body);
                
                diceData.push({ mesh, body });
            }
            positionDice();
        }

        function positionDice() {
            const spacing = 2;
            const startX = -((diceData.length - 1) * spacing) / 2;
            diceData.forEach((d, i) => {
                d.body.position.set(startX + (i * spacing), 1, 0);
                d.body.velocity.set(0,0,0);
                d.body.angularVelocity.set(0,0,0);
                d.mesh.position.copy(d.body.position);
                d.mesh.quaternion.copy(d.body.quaternion);
            });
        }

        function showResult(x, z) {
            const div = document.createElement('div');
            div.className = 'hologram-text';
            // Geometriye göre rastgele ama kararlı sayı üretimi (Düşünce simülasyonu)
            const max = parseInt(currentType.replace('d', ''));
            div.textContent = Math.floor(Math.random() * max) + 1;
            holoContainer.appendChild(div);
            
            const pos = new THREE.Vector3(x, 2, z).project(camera);
            const rect = container.getBoundingClientRect();
            div.style.left = (pos.x * .5 + .5) * rect.width + 'px';
            div.style.top = (-(pos.y * .5) + .5) * rect.height + 'px';
            
            gsap.to(div, { opacity: 1, y: -30, duration: 0.5, ease: "back.out" });
        }

        document.getElementById('rollBtn').onclick = () => {
            if (isRolling) return;
            isRolling = true;
            holoContainer.innerHTML = '';
            document.getElementById('rollBtn').classList.add('opacity-70');
            
            diceData.forEach(d => {
                d.body.position.set((Math.random() - 0.5) * 4, 8 + Math.random() * 4, (Math.random() - 0.5) * 4);
                d.body.velocity.set((Math.random() - 0.5) * 10, -15, (Math.random() - 0.5) * 10);
                d.body.angularVelocity.set(Math.random() * 20, Math.random() * 20, Math.random() * 20);
            });

            setTimeout(checkSettled, 1000);
        };

        function checkSettled() {
            let settled = diceData.every(d => d.body.velocity.lengthSquared() < 0.05 && d.body.angularVelocity.lengthSquared() < 0.05);
            if (settled) {
                isRolling = false;
                document.getElementById('rollBtn').classList.remove('opacity-70');
                diceData.forEach(d => showResult(d.body.position.x, d.body.position.z));
            } else {
                requestAnimationFrame(checkSettled);
            }
        }

        document.getElementById('diceCount').oninput = (e) => {
            document.getElementById('diceCountDisplay').textContent = e.target.value;
            if(!isRolling) buildDice();
        };

        document.querySelectorAll('.dice-type-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.dice-type-btn').forEach(b => b.className = 'dice-type-btn bg-slate-800 text-slate-300 py-2 rounded-lg border border-slate-700 transition');
                e.target.className = 'dice-type-btn bg-blue-600 text-white py-2 rounded-lg border border-blue-400 transition shadow-[0_0_10px_rgba(59,130,246,0.3)]';
                currentType = e.target.dataset.type;
                if(!isRolling) buildDice();
            };
        });

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            diceData.forEach(d => { d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion); });
            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            holoContainer.innerHTML = '';
        };

        buildDice();
        animate();
    </script>
</body>
